[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-scripts",
  "composer dump-autoload --optimize",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan package:discover --ansi"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
